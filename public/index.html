// Best-effort individual lead records from Meta Lead Ads (needs leads_retrieval; degrades gracefully).
function useLeadRecords(){
  const [s,setS] = useState({ loading:true, available:false, configured:false, leads:[], forms:[], reason:null });
  useEffect(()=>{ let alive=true;
    fetch('/api/leads').then(r=>r.json()).then(j=>{ if(!alive) return;
      setS({ loading:false, available:!!j.available, configured:!!j.configured, leads:j.leads||[], forms:j.forms||[], reason:j.reason||j.error||null }); })
      .catch(e=>{ if(!alive) return; setS({ loading:false, available:false, configured:false, leads:[], forms:[], reason:String(e) }); });
    return ()=>{ alive=false; }; },[]);
  return s;
}

// A simple, legible conversion funnel (no chart lib) — Impressions → Clicks → Leads with step rates.
function LeadFunnel({ impressions, clicks, leads }){
  const max = Math.max(impressions, 1);
  const stages = [
    { label:'Impressions', value:impressions, color:C.azure },
    { label:'Clicks', value:clicks, color:C.orange, rate: impressions? clicks/impressions*100 : 0, rateLabel:'CTR' },
    { label:'Leads', value:leads, color:C.turquoise, rate: clicks? leads/clicks*100 : 0, rateLabel:'CVR' }
  ];
  return <div className="space-y-3.5">{stages.map((s)=>
    <div key={s.label}>
      <div className="flex items-center justify-between text-[12px] mb-1">
        <span className="font-medium" style={{ color:C.ink }}>{s.label}</span>
        <span className="tabnum font-semibold" style={{ color:C.azure }}>{fmtNum(s.value)}{s.rate!=null && <span className="ml-2 text-[11px] font-medium" style={{ color:C.grey }}>{s.rateLabel} {s.rate.toFixed(2)}%</span>}</span>
      </div>
      <div className="h-2.5 rounded-full bg-[#EEF1F8] overflow-hidden"><div className="h-full rounded-full" style={{ width: Math.max(2, s.value/max*100)+'%', background:s.color, transition:'width .5s var(--ease)' }} /></div>
    </div>)}</div>;
}

function fmtLeadTime(t){ try{ const d=new Date(t); if(isNaN(d)) return ''; return d.toLocaleDateString('en-IN',{ day:'2-digit', month:'short' })+' · '+d.toLocaleTimeString('en-IN',{ hour:'2-digit', minute:'2-digit' }); }catch(e){ return ''; } }

// Build a CSV string from the dynamic field labels + lead rows (for the Export button).
function leadsToCSV(labels, leads){
  const esc=v=>{ const s=(v==null?'':String(v)); return /[",\n]/.test(s)? '"'+s.replace(/"/g,'""')+'"' : s; };
  const head=['Received','Campaign','Form',...labels];
  const lines=[head.map(esc).join(',')];
  leads.forEach(l=>{ const byLabel={}; (l.fields||[]).forEach(f=>{ byLabel[f.label]=f.value; });
    lines.push([fmtLeadTime(l.createdTime), l.campaign||'', l.form||'', ...labels.map(lb=>byLabel[lb]||'')].map(esc).join(',')); });
  return lines.join('\n');
}
function downloadCSV(filename, csv){ try{ const blob=new Blob([csv],{ type:'text/csv;charset=utf-8;' }); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500); }catch(e){} }

// Full single-lead view — every captured field, in form order.
function LeadDetailDrawer({ lead, onClose }){
  return <Drawer open={!!lead} onClose={onClose} title={lead? (lead.name||'Lead details') : ''} accent={C.turquoise}>
    {lead && <div>
      <div className="flex flex-wrap items-center gap-2 mb-4">
        <span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{ background:C.turquoise+'22', color:'#066A5B' }}>{fmtLeadTime(lead.createdTime)}</span>
        {lead.campaign && <span className="text-xs font-medium" style={{ color:C.grey }}>{lead.campaign}</span>}
      </div>
      <div className="space-y-2.5">
        {(lead.fields||[]).map((f,i)=> <div key={i} className="rounded-xl border border-[#EEF1F8] p-3 bg-[#FBFCFE]">
          <div className="text-[10px] font-semibold uppercase tracking-wide mb-0.5" style={{ color:C.grey }}>{f.label}</div>
          <div className="text-[13px] font-medium break-words" style={{ color:C.ink }}>{f.value||'—'}</div>
        </div>)}
      </div>
      {lead.form && <div className="text-[11px] font-medium mt-3" style={{ color:C.grey }}>Form: {lead.form}</div>}
    </div>}
  </Drawer>;
}

function LeadsNotConnected({ reason }){
  return <div className="flex items-start gap-3 p-4 rounded-xl" style={{ background:'#FBFCFE', border:'1px solid #EEF1F8' }}>
    <div className="rounded-lg p-2 shrink-0" style={{ background:C.azure+'14' }}><Icon name="users" size={18} color={C.azure} /></div>
    <div>
      <div className="text-sm font-semibold mb-1" style={{ color:C.ink }}>Individual lead contacts not connected yet</div>
      <div className="text-[12px] font-medium" style={{ color:C.grey }}>{reason || 'Connect a leads source to list each lead here.'}</div>
      <div className="text-[11px] font-medium mt-2" style={{ color:C.grey }}>The volume, cost and conversion metrics are already live from Meta. To list every lead's full details (name, email, contact, school, city…), point <b>LEADS_CSV_URL</b> at a published Google Sheet of your leads (no Meta permission needed) — or grant the Meta token <b>leads_retrieval</b> + <b>pages_manage_ads</b>.</div>
    </div>
  </div>;
}

// Safe filename slug for per-campaign CSV downloads.
function slugify(s){ return (String(s||'campaign').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60)) || 'campaign'; }

// Reusable lead table — every Lead-Ad form field is a column. `showCampaign` hides the Campaign
// column when the rows already belong to one campaign group. Each row opens the full drawer.
function LeadTable({ leads, labels, showCampaign=true, onRow }){
  const thBase = "py-2.5 px-3 text-left text-[11px] font-semibold uppercase tracking-wide whitespace-nowrap";
  return <div className="overflow-x-auto -mx-1">
    <table className="text-sm border-collapse" style={{ minWidth:'100%' }}>
      <thead><tr className="border-b border-[#EEF1F8]">
        <th className={thBase} style={{ color:C.grey }}>Received</th>
        {showCampaign && <th className={thBase} style={{ color:C.grey }}>Campaign</th>}
        {labels.map(l=><th key={l} className={thBase} style={{ color:C.grey }}>{l}</th>)}
        <th className="px-3"></th>
      </tr></thead>
      <tbody>{leads.map((l,i)=>{ const byLabel={}; (l.fields||[]).forEach(f=>{ byLabel[f.label]=f.value; });
        return <tr key={l.id||i} className="row-hover border-b border-[#F4F6FB] cursor-pointer" onClick={()=>onRow&&onRow(l)}>
          <td className="py-2.5 px-3 whitespace-nowrap" style={{ color:C.grey }}>{fmtLeadTime(l.createdTime)}</td>
          {showCampaign && <td className="py-2.5 px-3 whitespace-nowrap font-medium" style={{ color:C.ink }}>{l.campaign||l.form||'—'}</td>}
          {labels.map(lb=><td key={lb} className="py-2.5 px-3" style={{ color:C.ink }}>{byLabel[lb]||'—'}</td>)}
          <td className="py-2.5 px-3 text-right"><Icon name="eye" size={15} color={C.grey} /></td>
        </tr>; })}</tbody>
    </table>
  </div>;
}

// One collapsible campaign group: header shows the campaign name, its lead count + share, and a
// per-campaign "CSV" download; expanding reveals that campaign's full lead table.
function CampaignLeadGroup({ name, leads, labels, total, onRow }){
  const [open,setOpen] = useState(false);
  const share = total? leads.length/total*100 : 0;
  return <div className="rounded-xl border border-[#EEF1F8] overflow-hidden">
    <div className="flex items-center gap-2 p-3 bg-[#FBFCFE]">
      <button onClick={()=>setOpen(o=>!o)} className="flex items-center gap-2 flex-1 min-w-0 text-left">
        <Icon name={open?'chevron-down':'chevron-right'} size={16} color={C.grey} />
        <span className="font-semibold truncate" style={{ color:C.ink }} title={name}>{name}</span>
        <span className="text-[11px] font-bold px-2 py-0.5 rounded-full shrink-0" style={{ background:C.turquoise+'22', color:'#066A5B' }}>{leads.length} lead{leads.length===1?'':'s'}</span>
        <span className="text-[11px] font-medium shrink-0" style={{ color:C.grey }}>{share.toFixed(0)}%</span>
      </button>
      <Btn variant="outline" size="sm" icon="download" onClick={()=>downloadCSV('gsl-leads-'+slugify(name)+'.csv', leadsToCSV(labels, leads))}>CSV</Btn>
    </div>
    {open && <div className="px-1 pb-1">{leads.length
      ? <LeadTable leads={leads} labels={labels} showCampaign={false} onRow={onRow} />
      : <div className="text-center py-6 text-sm font-medium" style={{ color:C.grey }}>No leads.</div>}</div>}
  </div>;
}

// Detailed lead records: filterable by campaign + search, exportable to CSV. Two views —
// "By campaign" groups each campaign's leads (with its own CSV link), and "All leads" is one flat table.
function LeadRecordsView({ rec }){
  const [campaign,setCampaign] = useState('All');
  const [search,setSearch] = useState('');
  const [group,setGroup] = useState('campaign');
  const [drawer,setDrawer] = useState(null);

  const campaigns = useMemo(()=>['All',...Array.from(new Set(rec.leads.map(l=>l.campaign).filter(Boolean)))],[rec.leads]);
  const labels = useMemo(()=>{ const seen=[], set=new Set(); rec.leads.forEach(l=>(l.fields||[]).forEach(f=>{ if(!set.has(f.label)){ set.add(f.label); seen.push(f.label); } })); return seen; },[rec.leads]);
  const rows = useMemo(()=>{ let r=rec.leads.slice();
    if(campaign!=='All') r=r.filter(l=>l.campaign===campaign);
    const q=search.trim().toLowerCase();
    if(q) r=r.filter(l=> (l.name+' '+l.email+' '+l.phone+' '+l.campaign+' '+(l.fields||[]).map(f=>f.value).join(' ')).toLowerCase().includes(q));
    r.sort((a,b)=> new Date(b.createdTime)-new Date(a.createdTime));
    return r; },[rec.leads,campaign,search]);
  // Group the (already filtered) rows by campaign, largest first.
  const grouped = useMemo(()=>{ const m=new Map();
    rows.forEach(l=>{ const k=l.campaign||l.form||'Uncategorized'; if(!m.has(k)) m.set(k,[]); m.get(k).push(l); });
    return Array.from(m.entries()).map(([name,leads])=>({ name, leads })).sort((a,b)=>b.leads.length-a.leads.length); },[rows]);

  if(rec.loading) return <SectionCard><div className="flex items-center gap-2 text-sm font-medium py-10 justify-center" style={{ color:C.grey }}><Icon name="loader" size={16} color={C.grey} />Loading lead records…</div></SectionCard>;
  if(!rec.available || !rec.leads.length) return <SectionCard title="Lead records"><LeadsNotConnected reason={rec.reason} /></SectionCard>;

  return <>
    <SectionCard title="Lead records" right={
      <div className="flex flex-wrap items-center gap-2">
        <div className="inline-flex rounded-lg bg-[#F1F4FB] p-0.5">
          {[['campaign','By campaign'],['flat','All leads']].map(([k,l])=>
            <button key={k} onClick={()=>setGroup(k)} className="px-2.5 py-1 rounded-md text-[12px] font-semibold transition-all" style={ group===k?{ background:'#fff', color:C.azure, boxShadow:'0 1px 4px -1px rgba(7,51,147,.18)' }:{ background:'transparent', color:C.grey } }>{l}</button>)}
        </div>
        <div className="relative"><span className="absolute left-2.5 top-1/2 -translate-y-1/2"><Icon name="search" size={14} color={C.grey} /></span>
          <input className="inp" style={{ paddingLeft:'30px', width:'180px' }} value={search} placeholder="Search leads…" onChange={e=>setSearch(e.target.value)} /></div>
        <div className="min-w-[150px]"><Select value={campaign} onChange={setCampaign} options={campaigns.map(c=>({ value:c, label:c==='All'?'All campaigns':c }))} /></div>
        <Btn variant="outline" size="sm" icon="download" onClick={()=>downloadCSV('gsl-leads.csv', leadsToCSV(labels, rows))}>Export all</Btn>
        <span className="text-xs font-semibold" style={{ color:C.grey }}>{rows.length} lead{rows.length===1?'':'s'}</span>
      </div>}>
      {!rows.length
        ? <div className="text-center py-10 text-sm font-medium" style={{ color:C.grey }}>No leads match these filters.</div>
        : group==='campaign'
          ? <div className="space-y-2">{grouped.map(g=>
              <CampaignLeadGroup key={g.name} name={g.name} leads={g.leads} labels={labels} total={rows.length} onRow={setDrawer} />)}</div>
          : <LeadTable leads={rows} labels={labels} onRow={setDrawer} />}
    </SectionCard>
    <LeadDetailDrawer lead={drawer} onClose={()=>setDrawer(null)} />
  </>;
}

function LeadsPage(){
  const [period,setPeriod] = useState('all');
  const [view,setView] = useState('overview');
  const [meta, reloadMeta] = useMetaCampaigns(period==='all'? 'maximum':'last_30d');
  const rec = useLeadRecords();
  const [statusFilter,setStatusFilter] = useState('All');
  const [vertFilter,setVertFilter] = useState('All');
  const [search,setSearch] = useState('');

  // Campaigns relevant to lead-gen: anything that produced leads or is a Leads-goal campaign.
  const leadCampaigns = useMemo(()=> meta.campaigns.filter(c=> (c.leads||0)>0 || c.goal==='Leads'), [meta.campaigns]);

  const agg = useMemo(()=>{
    const withLeads = meta.campaigns.filter(c=>(c.leads||0)>0);
    const totalLeads = meta.campaigns.reduce((s,c)=>s+(c.leads||0),0);
    const leadSpend = withLeads.reduce((s,c)=>s+(c.spend||0),0);
    const impressions = withLeads.reduce((s,c)=>s+(c.impressions||0),0);
    const clicks = withLeads.reduce((s,c)=>s+(c.clicks||0),0);
    const cpls = withLeads.map(c=>c.spend/c.leads).filter(x=>isFinite(x)&&x>0);
    const byProg = {};
    withLeads.forEach(c=>{ byProg[c.vertical]=(byProg[c.vertical]||0)+(c.leads||0); });
    const programs = Object.keys(byProg).map(k=>({ vertical:k, leads:byProg[k] })).sort((a,b)=>b.leads-a.leads);
    return {
      totalLeads, leadSpend, impressions, clicks,
      avgCpl: totalLeads? leadSpend/totalLeads : 0,
      bestCpl: cpls.length? Math.min(...cpls) : 0,
      convRate: clicks? totalLeads/clicks*100 : 0,
      activeCampaigns: withLeads.filter(c=>c.status==='Active').length,
      programs
    };
  },[meta.campaigns]);

  const filtered = useMemo(()=>{
    let r = leadCampaigns.slice();
    if(statusFilter!=='All') r=r.filter(c=>c.status===statusFilter);
    if(vertFilter!=='All') r=r.filter(c=>c.vertical===vertFilter);
    const q=search.trim().toLowerCase(); if(q) r=r.filter(c=>(c.name||'').toLowerCase().includes(q));
    r.sort((a,b)=>(b.leads||0)-(a.leads||0));
    return r;
  },[leadCampaigns,statusFilter,vertFilter,search]);

  const kpis = [
    { label:'Total Leads', value:fmtNum(agg.totalLeads), icon:'user-plus', accent:C.turquoise },
    { label:'Avg CPL', value: agg.avgCpl? '₹'+Math.round(agg.avgCpl) : '—', icon:'wallet', accent:C.orange },
    { label:'Lead Spend', value:fmtINR(agg.leadSpend), icon:'credit-card', accent:C.azure },
    { label:'Click→Lead', value:agg.convRate.toFixed(2)+'%', icon:'percent', accent:C.purple },
    { label:'Best CPL', value: agg.bestCpl? '₹'+Math.round(agg.bestCpl) : '—', icon:'trending-down', accent:C.turquoise },
    { label:'Active Campaigns', value:agg.activeCampaigns, icon:'radio', accent:C.azure, sub:'generating leads' }
  ];

  const cols = [
    { key:'name', label:'Campaign', bold:true },
    { key:'vertical', label:'Program', render:r=><span className="inline-flex items-center gap-1.5"><span className="w-2 h-2 rounded-full" style={{ background:VERTICAL_COLORS[r.vertical] }} />{r.vertical}</span> },
    { key:'status', label:'Status', render:r=><StatusPill status={r.status} /> },
    { key:'leads', label:'Leads', align:'right', render:r=>fmtNum(r.leads||0) },
    { key:'spend', label:'Spend', align:'right', render:r=>fmtINR(r.spend) },
    { key:'cpl', label:'CPL', align:'right', sortValue:r=> r.leads? r.spend/r.leads : 0, render:r=> r.leads? '₹'+Math.round(r.spend/r.leads) : '—' }
  ];
  const maxProg = agg.programs.length? agg.programs[0].leads : 0;

  return <div>
    <PageHeader title="Leads" subtitle="Live lead monitoring from Meta — volume, cost, sources and conversion" period={period} onPeriod={setPeriod}>
      {!meta.loading && meta.configured && meta.ok && <LiveBadge fetchedAt={meta.fetchedAt} onRefresh={reloadMeta} loading={meta.loading} />}
    </PageHeader>

    {!meta.loading && (!meta.configured || !meta.ok) &&
      <div className="mb-4 flex items-start gap-3 p-4 rounded-2xl border" style={{ background:'#FFF5F5', borderColor:'#FED7D7' }}>
        <Icon name="alert-circle" size={18} color="#C53030" />
        <div><div className="text-sm font-bold mb-1" style={{ color:'#C53030' }}>{meta.configured? 'Meta Ads API error' : 'Meta not configured'}</div>
          <div className="text-xs font-medium" style={{ color:'#742A2A' }}>{meta.error || 'Set META_ACCESS_TOKEN and META_AD_ACCOUNT_ID, then redeploy.'}</div></div>
      </div>}

    <div className="inline-flex rounded-xl bg-white border border-[#E6EAF2] p-1 mb-4" style={{ boxShadow:'0 2px 8px -4px rgba(7,51,147,.1)' }}>
      {[['overview','Overview'],['records','Lead records']].map(([k,l])=> <button key={k} onClick={()=>setView(k)} className="px-4 py-2 rounded-lg text-sm font-semibold transition-all inline-flex items-center gap-1.5" style={ view===k?{ background:C.turquoise, color:C.azure }:{ background:'transparent', color:C.grey } }>{l}{k==='records' && rec.available && rec.leads.length>0 && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full" style={{ background:view===k?C.azure:'#EEF1F8', color:view===k?'#fff':C.grey }}>{rec.count||rec.leads.length}</span>}</button>)}
    </div>

    {view==='records'
      ? <LeadRecordsView rec={rec} />
      : meta.loading
      ? <div className="flex items-center gap-2 text-sm font-medium py-16 justify-center" style={{ color:C.grey }}><Icon name="loader" size={18} color={C.grey} />Loading leads from Meta…</div>
      : <>
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-4">{kpis.map((k,i)=><KPI key={i} {...k} />)}</div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
          <div className="lg:col-span-2"><SectionCard title="Daily leads" right={<span className="text-xs font-semibold" style={{ color:C.grey }}>{period==='all'?'All time':'Last 30 days'}</span>}>
            {meta.trend && meta.trend.length
              ? <ResponsiveContainer width="100%" height={250}><AreaChart data={meta.trend} margin={{ left:-12, right:8, top:8 }}>
                  <defs><linearGradient id="leadG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.turquoise} stopOpacity={0.35} /><stop offset="100%" stopColor={C.turquoise} stopOpacity={0.03} /></linearGradient></defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="#EEF1F8" vertical={false} />
                  <XAxis dataKey="label" tick={{ fontSize:10, fill:C.grey }} axisLine={false} tickLine={false} interval={Math.max(0,Math.floor(meta.trend.length/6))} angle={-30} textAnchor="end" height={44} />
                  <YAxis tick={{ fontSize:10, fill:C.grey }} axisLine={false} tickLine={false} width={34} allowDecimals={false} />
                  <Tooltip content={<TT />} /><Area type="monotone" dataKey="leads" name="leads" stroke={C.turquoise} strokeWidth={2.5} fill="url(#leadG)" animationDuration={700} />
                </AreaChart></ResponsiveContainer>
              : <div className="text-center py-16 text-sm font-medium" style={{ color:C.grey }}>No daily lead data in this period.</div>}
          </SectionCard></div>
          <SectionCard title="Conversion funnel">
            {agg.totalLeads>0 || agg.impressions>0
              ? <LeadFunnel impressions={agg.impressions} clicks={agg.clicks} leads={agg.totalLeads} />
              : <div className="text-center py-12 text-sm font-medium" style={{ color:C.grey }}>No funnel data yet.</div>}
          </SectionCard>
        </div>

        <SectionCard title="Leads by program" className="mb-4" right={<span className="text-xs font-semibold" style={{ color:C.grey }}>{fmtNum(agg.totalLeads)} total</span>}>
          {agg.programs.length
            ? <div className="space-y-2.5">{agg.programs.map(p=>{ const pct=maxProg? p.leads/maxProg*100:0; const share=agg.totalLeads? p.leads/agg.totalLeads*100:0;
                return <div key={p.vertical}>
                  <div className="flex items-center justify-between text-[12px] mb-1"><span className="font-medium inline-flex items-center gap-1.5" style={{ color:C.ink }}><span className="w-2 h-2 rounded-full" style={{ background:VERTICAL_COLORS[p.vertical] }} />{p.vertical}</span>
                    <span className="tabnum" style={{ color:C.grey }}><b style={{ color:C.ink }}>{fmtNum(p.leads)}</b> · {share.toFixed(0)}%</span></div>
                  <div className="h-2 rounded-full bg-[#EEF1F8] overflow-hidden"><div className="h-full rounded-full" style={{ width:Math.max(2,pct)+'%', background:VERTICAL_COLORS[p.vertical], transition:'width .5s var(--ease)' }} /></div>
                </div>; })}</div>
            : <div className="text-center py-10 text-sm font-medium" style={{ color:C.grey }}>No leads recorded yet in this period.</div>}
        </SectionCard>

        <SectionCard title="Lead campaigns" className="mb-4" right={
          <div className="flex flex-wrap items-center gap-2">
            <div className="relative"><span className="absolute left-2.5 top-1/2 -translate-y-1/2"><Icon name="search" size={14} color={C.grey} /></span>
              <input className="inp" style={{ paddingLeft:'30px', width:'160px' }} value={search} placeholder="Search…" onChange={e=>setSearch(e.target.value)} /></div>
            <div className="min-w-[120px]"><Select value={vertFilter} onChange={setVertFilter} options={['All',...VERTICALS].map(v=>({ value:v, label:v==='All'?'All programs':v }))} /></div>
            <StatusChips value={statusFilter} onChange={setStatusFilter} options={['All','Active','Paused','Completed']} />
          </div>}>
          <SortableTable columns={cols} rows={filtered} initialSort={{ key:'leads', dir:'desc' }} getKey={r=>r.id} empty="No lead campaigns match these filters." />
        </SectionCard>

        <div className="rounded-2xl border border-dashed border-[#D5DBE8] p-4 flex items-center justify-between gap-3 flex-wrap" style={{ background:'#FBFCFE' }}>
          <div className="text-[12px] font-medium" style={{ color:C.grey }}>{rec.available && rec.leads.length
            ? <>See every lead's full details — name, email, contact, designation, school, city, bootcamp timing — in <b style={{ color:C.ink }}>Lead records</b>.</>
            : 'Connect Meta Lead Ad forms to see each lead’s full details (needs leads_retrieval permission).'}</div>
          <Btn variant="ghost" size="sm" icon="table" onClick={()=>setView('records')}>{rec.available && rec.leads.length? 'Open lead records' : 'Lead records'}</Btn>
        </div>
      </>}
  </div>;
}

        </div>
        <div className="flex items-center gap-2">
          <span className="hidden sm:inline-flex items-center gap-1.5 text-[11px] font-semibold px-2.5 py-1 rounded-full" style={{ background: Persist.mode==='local'?'#E0F7F3':'#FEF3C7', color: Persist.mode==='local'?'#066A5B':'#92660A' }}>
            <Icon name={Persist.mode==='local'?'check-circle-2':'info'} size={12} color={Persist.mode==='local'?'#066A5B':'#92660A'} />{Persist.mode==='local'?'Saved locally':'Resets on refresh'}</span>
          <Btn variant="ghost" size="sm" icon="settings" onClick={()=>setSettingsOpen(true)}>Settings</Btn>
        </div>
      </header>
      <main className="flex-1 overflow-y-auto px-4 sm:px-6 lg:px-8 py-5 sm:py-7" key={active}>
        <div className="max-w-[1320px] mx-auto fade-up">{PAGES[active]}</div>
      </main>
    </div>
    <SettingsModal open={settingsOpen} onClose={()=>setSettingsOpen(false)} api={api} persistMode={Persist.mode} />
    <ChatAssistant />
  </div>;
}

/* ---- Boot ---- */
const __rootEl = document.getElementById('root');
__rootEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Montserrat,sans-serif;color:#073393;font-weight:600;font-size:14px;">Loading Marketing Mirror…</div>';
function __mount(){ bindRecharts(); ReactDOM.createRoot(__rootEl).render(<ToastHost><App /></ToastHost>); }
window.__boot().then(__mount).catch(__mount);

</script>
</body>
</html>
