  function ensure(check, urls){ if(check()) return Promise.resolve(); return urls.reduce(function(p,url){ return p.catch(function(){ if(check()) return Promise.resolve(); return loadScript(url).then(function(){ if(!check()) throw 0; }); }); }, Promise.reject()); }

/* =========================================================
   PERSISTENCE LAYER
   - Detects whether localStorage is usable (works when the file
     is opened directly in a browser; blocked inside claude.ai).
   - Falls back to an in-memory object so the app never crashes.
   ========================================================= */
const STORAGE_KEY = 'gsl_growth_os_v2';
const Persist = (function(){
  let usable = false;
  try {
    const k='__gsl_test__';
    window.localStorage.setItem(k,'1');
    window.localStorage.removeItem(k);
    usable = true;
  } catch(e){ usable = false; }
  let mem = null;
  return {
    mode: usable ? 'local' : 'memory',
    load(){
      if(usable){
        try { const raw = window.localStorage.getItem(STORAGE_KEY); return raw? JSON.parse(raw): null; } catch(e){ return null; }
      }
      return mem;
    },
    save(data){
      if(usable){
        try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){ mem = data; }
      } else { mem = data; }
    },
    clear(){
      if(usable){ try { window.localStorage.removeItem(STORAGE_KEY); } catch(e){} }
      mem = null;
    }
  };
})();

/* ---- Seeded RNG for any synthetic analytics series ---- */
function mulberry(seed){ return function(){ let t=seed+=0x6D2B79F5; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; }; }

/* =========================================================
   GLOBAL STORE HOOK
   ========================================================= */
function useStore(){
  const [data, setData] = useState(()=>{
    const loaded = Persist.load();
    if(loaded && loaded.campaigns) return loaded;
    const seeded = seedData();
    Persist.save(seeded);
    return seeded;
  });
  useEffect(()=>{ Persist.save(data); }, [data]);

  const api = useMemo(()=>({
    // generic collection ops
    add(coll, item){ setData(d=>({ ...d, [coll]:[{ id:uid(), ...item }, ...d[coll]] })); },
    update(coll, id, patch){ setData(d=>({ ...d, [coll]:d[coll].map(x=> x.id===id? { ...x, ...patch } : x) })); },
    remove(coll, id){ setData(d=>({ ...d, [coll]:d[coll].filter(x=> x.id!==id) })); },
    resetAll(){ const s=seedData(); Persist.save(s); setData(s); },
    wipeAll(){ const empty={ campaigns:[], events:[], deliverables:[], posts:[], tasks:[], _ts:Date.now() }; Persist.save(empty); setData(empty); }
  }), []);

  return [data, api];
}

const fmtINR = (n)=>{ if(n==null||isNaN(n)) return '—';
  if(Math.abs(n)>=10000000) return '₹'+(n/10000000).toFixed(2)+' Cr';
  if(Math.abs(n)>=100000) return '₹'+(n/100000).toFixed(2)+' L';
  if(Math.abs(n)>=1000) return '₹'+(n/1000).toFixed(1)+'K';
  return '₹'+Math.round(n).toLocaleString('en-IN'); };
const fmtNum = (n)=>{ if(n==null||isNaN(n)) return '—';
  if(Math.abs(n)>=1000000) return (n/1000000).toFixed(2)+'M';
  if(Math.abs(n)>=1000) return (n/1000).toFixed(1)+'K';
  return Math.round(n).toLocaleString('en-IN'); };

/* ---------------- Icon helper (lucide) ---------------- */
function Icon({ name, size=18, color='currentColor', strokeWidth=2, style }){
  const ref = useRef(null);
  useEffect(()=>{ if(ref.current){ ref.current.innerHTML='';
    const el=document.createElement('i'); el.setAttribute('data-lucide',name); ref.current.appendChild(el);
    if(window.lucide) window.lucide.createIcons({ attrs:{ width:size, height:size, stroke:color, 'stroke-width':strokeWidth }, nameAttr:'data-lucide' }); } },[name,size,color,strokeWidth]);
  return <span ref={ref} style={{ display:'inline-flex', lineHeight:0, ...style }} />;
}

/* ---- Button ---- */
function Btn({ children, onClick, variant='primary', size='md', icon, type='button', disabled }){
  const base="inline-flex items-center justify-center gap-1.5 font-semibold rounded-xl transition-all whitespace-nowrap";
  const sizes={ sm:'px-3 py-1.5 text-xs', md:'px-4 py-2 text-[13px]', lg:'px-5 py-2.5 text-sm' };
  const variants={
    primary:{ background:C.azure, color:'#fff' },
    turq:{ background:C.turquoise, color:C.azure },
    ghost:{ background:'#F1F4FB', color:C.azure },
    danger:{ background:'#FDE8E8', color:'#C53030' },
    outline:{ background:'#fff', color:C.azure, border:'1px solid #E0E5F0' }
  };
  return <button type={type} onClick={onClick} disabled={disabled}
    className={base+' '+sizes[size]+(disabled?' opacity-50 cursor-not-allowed':' hover:opacity-90 active:scale-95')}
    style={variants[variant]}>{icon && <Icon name={icon} size={size==='sm'?14:16} color={variants[variant].color} />}{children}</button>;
}

/* ---- Sortable table ---- */
function SortableTable({ columns, rows, initialSort, onRowClick, getKey, empty }){
  const [sort, setSort] = useState(initialSort || { key:columns[0].key, dir:'asc' });
  const sorted = useMemo(()=>{ const col=columns.find(c=>c.key===sort.key); const arr=[...rows];
    arr.sort((a,b)=>{ let av=a[sort.key], bv=b[sort.key]; if(col&&col.sortValue){ av=col.sortValue(a); bv=col.sortValue(b); }
      if(typeof av==='string'&&typeof bv==='string') return sort.dir==='asc'? av.localeCompare(bv): bv.localeCompare(av);
      return sort.dir==='asc'? (av-bv):(bv-av); }); return arr; },[rows,sort,columns]);
  const toggle=(k)=> setSort(s=> s.key===k? { key:k, dir:s.dir==='asc'?'desc':'asc' } : { key:k, dir:'asc' });
  if(!rows.length) return <div className="text-center py-10 text-sm font-medium" style={{ color:C.grey }}>{empty||'Nothing here yet.'}</div>;
  return <div className="overflow-x-auto -mx-1"><table className="w-full text-sm border-collapse"><thead>
    <tr className="border-b border-[#EEF1F8]">{columns.map(c=>
      <th key={c.key} onClick={()=> c.sortable!==false && toggle(c.key)}
        className={"py-2.5 px-3 text-[11px] font-semibold uppercase tracking-wide select-none "+(c.align==='right'?'text-right':'text-left')+(c.sortable!==false?' cursor-pointer':'')} style={{ color:C.grey }}>
        <span className="inline-flex items-center gap-1">{c.label}{c.sortable!==false && sort.key===c.key && <Icon name={sort.dir==='asc'?'chevron-up':'chevron-down'} size={12} color={C.azure} />}</span></th>)}</tr></thead>
    <tbody>{sorted.map((r,i)=> <tr key={getKey?getKey(r):i} onClick={()=> onRowClick && onRowClick(r)} className={"row-hover border-b border-[#F4F6FB] "+(onRowClick?'cursor-pointer':'')}>
      {columns.map(c=> <td key={c.key} className={"py-2.5 px-3 "+(c.align==='right'?'text-right tabnum':'text-left')} style={{ color:C.ink, fontWeight:c.bold?600:400 }}>{c.render? c.render(r): r[c.key]}</td>)}</tr>)}</tbody></table></div>;
}

/* ---- Campaign category (by objective) ----
   Every campaign is Performance Marketing, but reporting is clearer when we split
   by objective: Lead Generation vs Social Media Boosts. Sub-buckets drive the
   Category filter dropdown and the grouped tables. */
const CATEGORY_TREE = [
  { group:'Lead Generation', subs:['HBI','Future Skills','Summer Bootcamps','Other lead-gen campaigns'] },
  { group:'Social Media Boost', subs:['Monthly Boosts','Post-wise Boosts'] }
];
const CATEGORY_GROUPS = CATEGORY_TREE.map(t=>t.group);
function campaignCategory(c){
  const name=((c&&c.name)||'').toLowerCase();
  const goal=(((c&&(c.goal||c.objective))||'')+'').toLowerCase();
  const isSocial = (c&&c.vertical==='Social')
    || /\bboost\b|engagement|follower|awareness|reel/.test(goal)
    || /\bboost\b|engagement|follower|awareness|reel/.test(name);
  if(isSocial){
    const sub = /post|reel|carousel|story/.test(name) ? 'Post-wise Boosts' : 'Monthly Boosts';
    return { group:'Social Media Boost', sub };
  }
  let sub='Other lead-gen campaigns';
  if(c&&(c.vertical==='HBI') || name.includes('hbi')) sub='HBI';
  else if(c&&(c.vertical==='GSL') || name.includes('future skill') || /\bdau\b|\btma\b/.test(name)) sub='Future Skills';
  else if(c&&(c.vertical==='Bootcamps') || name.includes('bootcamp') || name.includes('summer')) sub='Summer Bootcamps';
  return { group:'Lead Generation', sub };
}
/* Options for the Category <Select> — indented sub-buckets under each group. */
const CATEGORY_OPTIONS = (()=>{ const o=[{ value:'all', label:'All categories' }];
  CATEGORY_TREE.forEach(t=>{ o.push({ value:'group:'+t.group, label:t.group });
    t.subs.forEach(s=> o.push({ value:'sub:'+s, label:' — '+s })); }); return o; })();
function matchesCategory(cat, sel){
  if(!sel || sel==='all') return true;
  const i=sel.indexOf(':'); const type=sel.slice(0,i), val=sel.slice(i+1);
  return type==='group'? cat.group===val : cat.sub===val;
}

function campaignView(c, period){
  const f = period==='month'? 0.21 : 1;
  const spend=Math.round(c.spend*f), leads=Math.round(c.leads*f);
  const impressions=Math.round(c.impressions*f), clicks=Math.round(c.clicks*f), conversions=Math.round(c.conversions*f);
  return { ...c, vSpend:spend, vLeads:leads, vImpr:impressions, vClicks:clicks, vConv:conversions,
    cpl: leads? spend/leads:0, cpc: clicks? spend/clicks:0, cac: conversions? spend/conversions:0 };
}
function aggPerf(list, period){
  const v=list.map(c=>campaignView(c,period));
  const spend=v.reduce((s,x)=>s+x.vSpend,0), impressions=v.reduce((s,x)=>s+x.vImpr,0);
  const clicks=v.reduce((s,x)=>s+x.vClicks,0), leads=v.reduce((s,x)=>s+x.vLeads,0);
  const conversions=v.reduce((s,x)=>s+x.vConv,0), revenue=v.reduce((s,x)=>s+x.vSpend*x.roas,0);
  const budget=list.reduce((s,x)=>s+(x.budget||0),0)*(period==='month'?0.21:1);
  return { spend, impressions, reach:Math.round(impressions*0.62), clicks, leads, conversions,
    cpc:clicks?spend/clicks:0, cpl:leads?spend/leads:0, cac:conversions?spend/conversions:0,
    ctr:impressions?clicks/impressions*100:0, convRate:clicks?conversions/clicks*100:0,
    roas:spend?revenue/spend:0, revenue, budget, util: budget? Math.min(100,spend/budget*100):0 };
}
function spendSeries(period, list){
  const total=list.reduce((s,x)=>s+x.spend,0);
  const labels = periodLabels(period);
  const pts = labels.length;
  const base = total/pts;
  return labels.map(label=>({ label, spend:Math.round(base*between(.6,1.4)), cpl:Math.round(between(180,640)) }));
}
function platformSpend(list, period){ const v=list.map(c=>campaignView(c,period)); const out={};
  PAID_PLATFORMS.forEach(p=>out[p]=0); v.forEach(c=>{ out[c.platform]=(out[c.platform]||0)+c.vSpend; });
  return PAID_PLATFORMS.map(p=>({ name:p, value:out[p], fill:PLATFORM_COLORS[p] })).filter(x=>x.value>0); }

/* =========================================================
   META LIVE DATA  — fetches from the /api/meta serverless proxy
   Falls back silently when the backend is absent (e.g. claude.ai
   preview or before Vercel env vars are set).
   ========================================================= */
function useMetaCampaigns(datePreset){
  const [state,setState] = useState({ loading:true, configured:false, ok:false, campaigns:[], trend:[], error:null, fetchedAt:null, account:null });
  const reqRef = useRef(0);
  const load = useCallback(()=>{
    const myReq = ++reqRef.current;
    setState(s=>({ ...s, loading:true }));
    Promise.all([
      fetch('/api/meta?resource=campaigns&date_preset='+datePreset).then(r=>r.json()).catch(e=>({ configured:false, ok:false, error:String(e), campaigns:[] })),
      fetch('/api/meta?resource=trend&date_preset='+datePreset).then(r=>r.json()).catch(()=>({ trend:[] }))
    ]).then(([c,t])=>{
      if(myReq!==reqRef.current) return; // ignore stale
      setState({ loading:false, configured:!!c.configured, ok:!!c.ok, campaigns:c.campaigns||[], trend:(t&&t.trend)||[], error:c.error||null, fetchedAt:c.fetchedAt||null, account:c.account||null });
    });
  },[datePreset]);
  useEffect(()=>{ load(); const iv=setInterval(load, 90000); return ()=>clearInterval(iv); },[load]);
  return [state, load];
}

function metaTotals(list){
  const sum=(k)=>list.reduce((s,x)=>s+(x[k]||0),0);
  const spend=sum('spend'), clicks=sum('clicks'), leads=sum('leads'), purchases=sum('purchases');
  const conversions=leads+purchases;
  // Blended CPL must divide ONLY the spend of lead-generating campaigns by total leads.
  // Dividing total spend (which includes awareness/boost campaigns that yield zero leads) by
  // leads overstates CPL — that was the bug. Same idea for CAC with converting campaigns.
  const leadSpend=list.reduce((s,x)=>s+((x.leads>0)?(x.spend||0):0),0);
  const convSpend=list.reduce((s,x)=>s+(((x.leads>0)||(x.purchases>0))?(x.spend||0):0),0);
  const revenue=list.reduce((s,x)=>s+(x.roas? x.roas*x.spend:0),0);
  return { spend, impressions:sum('impressions'), reach:sum('reach'), clicks, leads, purchases, conversions,
    linkClicks:sum('linkClicks'), landingPageViews:sum('landingPageViews'),
    cpc: clicks? spend/clicks:0, cpl: leads? leadSpend/leads:0, cac: conversions? convSpend/conversions:0,
    ctr: sum('impressions')? clicks/sum('impressions')*100:0, roas: spend? revenue/spend:0,
    dailyBudget:sum('dailyBudget') };
}

      </div>}
    </Drawer>

}

/* =========================================================
   INSTAGRAM LIVE DATA — fetches from /api/instagram
   ========================================================= */
function useInstagram(){
  const [s,setS]=useState({ loading:true, configured:false, ok:false, profile:null, insights:null, totals:null, media:[], formats:[], audience:null, error:null, fetchedAt:null });
  const reqRef=useRef(0);
  const load=useCallback(()=>{
    const my=++reqRef.current; setS(p=>({ ...p, loading:true }));
    Promise.all([
      fetch('/api/instagram?resource=account').then(r=>r.json()).catch(e=>({ configured:false, ok:false, error:String(e) })),
      fetch('/api/instagram?resource=media').then(r=>r.json()).catch(()=>({ media:[], formats:[] })),
      fetch('/api/instagram?resource=audience').then(r=>r.json()).catch(()=>({ city:[], country:[], age:[], gender:[] }))
    ]).then(([a,m,aud])=>{ if(my!==reqRef.current) return;
      setS({ loading:false, configured:!!a.configured, ok:!!a.ok, profile:a.profile||null, insights:a.insights||null, totals:a.totals||null, media:m.media||[], formats:m.formats||[], audience:{ city:(aud&&aud.city)||[], country:(aud&&aud.country)||[], age:(aud&&aud.age)||[], gender:(aud&&aud.gender)||[] }, error:a.error||null, fetchedAt:a.fetchedAt||null });
    });
  },[]);
  useEffect(()=>{ load(); const iv=setInterval(load,120000); return ()=>clearInterval(iv); },[load]);
  return [s,load];
}

function useFacebook(){
  const [s,setS]=useState({ loading:true, configured:false, ok:false, profile:null, totals:null, trend:[], posts:[], audience:null, error:null, fetchedAt:null });
  const reqRef=useRef(0);
  const load=useCallback(()=>{
    const my=++reqRef.current; setS(p=>({ ...p, loading:true }));
    Promise.all([
      fetch('/api/facebook?resource=account').then(r=>r.json()).catch(e=>({ configured:false, ok:false, error:String(e) })),
      fetch('/api/facebook?resource=posts').then(r=>r.json()).catch(()=>({ posts:[] })),
      fetch('/api/facebook?resource=audience').then(r=>r.json()).catch(()=>({ city:[], country:[], genderAge:[] }))
    ]).then(([a,p,aud])=>{ if(my!==reqRef.current) return;
      setS({ loading:false, configured:!!a.configured, ok:!!a.ok, profile:a.profile||null, totals:a.totals||null, trend:a.trend||[], posts:(p&&p.posts)||[], audience:{ city:(aud&&aud.city)||[], country:(aud&&aud.country)||[], genderAge:(aud&&aud.genderAge)||[] }, error:a.error||null, fetchedAt:a.fetchedAt||null });
    });
  },[]);
  useEffect(()=>{ load(); const iv=setInterval(load,150000); return ()=>clearInterval(iv); },[load]);
  return [s,load];
}

// A compact metric tile used across the social views.

// Horizontal demographic bars from [{name,value}] (percent of total).
function DemoBars({ rows, color=C.purple, limit=6 }){
  const top = (rows||[]).slice(0, limit);
  const total = top.reduce((s,r)=>s+(r.value||0), 0) || 1;
  if(!top.length) return <div className="text-center py-6 text-[12px] font-medium" style={{ color:C.grey }}>Not available for this account.</div>;
  return <div className="space-y-2">{top.map((r,i)=>{ const pct=(r.value/total*100); return (
    <div key={i}>
      <div className="flex justify-between text-[11px] font-medium mb-0.5" style={{ color:C.ink }}><span>{r.name}</span><span className="tabnum" style={{ color:C.grey }}>{pct.toFixed(0)}%</span></div>
      <div className="h-2 rounded-full bg-[#EEF1F8] overflow-hidden"><div className="h-full rounded-full" style={{ width:pct+'%', background:color }} /></div>
    </div>); })}</div>;
}

  const topPosts = [...media].sort((a,b)=>b.engagement-a.engagement).slice(0,6);

    </div>
  </div>;
}

/* =========================================================
   LINKEDIN LIVE DATA — fetches from /api/linkedin
   ========================================================= */
function useLinkedIn(){
  const [s,setS]=useState({ loading:true, configured:false, ok:false, totals:null, followerSeries:[], posts:[], error:null, fetchedAt:null });
  const reqRef=useRef(0);
  const load=useCallback(()=>{
    const my=++reqRef.current; setS(p=>({ ...p, loading:true }));
    Promise.all([
      fetch('/api/linkedin?resource=account').then(r=>r.json()).catch(e=>({ configured:false, ok:false, error:String(e) })),
      fetch('/api/linkedin?resource=followers').then(r=>r.json()).catch(()=>({ followerSeries:[] })),
      fetch('/api/linkedin?resource=posts').then(r=>r.json()).catch(()=>({ posts:[] }))
    ]).then(([a,f,p])=>{ if(my!==reqRef.current) return;
      setS({ loading:false, configured:!!a.configured, ok:!!a.ok, totals:a.totals||null, followerSeries:(f&&f.followerSeries)||[], posts:(p&&p.posts)||[], error:a.error||null, fetchedAt:a.fetchedAt||null });
    });
  },[]);
  useEffect(()=>{ load(); const iv=setInterval(load,180000); return ()=>clearInterval(iv); },[load]);
  return [s,load];
}

  const set=(k,v)=>setF(s=>({ ...s,[k]:v }));
  const valid=f.name.trim() && f.budget!=='';
  return <>
    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div className="sm:col-span-2"><Field label="Campaign name *"><TextInput value={f.name} onChange={v=>set('name',v)} placeholder="e.g. Summer Bootcamp Lead Gen" /></Field></div>
      <Field label="Vertical"><Select value={f.vertical} onChange={v=>set('vertical',v)} options={VERTICALS} /></Field>
      <Field label="Platform"><Select value={f.platform} onChange={v=>set('platform',v)} options={PAID_PLATFORMS} /></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['Active','Paused','Completed']} /></Field>
      <Field label="ROAS (x)"><NumInput value={f.roas} onChange={v=>set('roas',v)} placeholder="e.g. 3.2" /></Field>
      <Field label="Budget *"><NumInput value={f.budget} onChange={v=>set('budget',v)} prefix="₹" placeholder="0" /></Field>
      <Field label="Spend"><NumInput value={f.spend} onChange={v=>set('spend',v)} prefix="₹" placeholder="0" /></Field>
      <Field label="Leads"><NumInput value={f.leads} onChange={v=>set('leads',v)} placeholder="0" /></Field>
      <Field label="Conversions"><NumInput value={f.conversions} onChange={v=>set('conversions',v)} placeholder="0" /></Field>
      <Field label="Impressions"><NumInput value={f.impressions} onChange={v=>set('impressions',v)} placeholder="0" /></Field>
      <Field label="Clicks"><NumInput value={f.clicks} onChange={v=>set('clicks',v)} placeholder="0" /></Field>
      <Field label="Start date"><TextInput type="date" value={f.startDate} onChange={v=>set('startDate',v)} /></Field>
      <Field label="End date"><TextInput type="date" value={f.endDate} onChange={v=>set('endDate',v)} /></Field>
    </div>
    <div className="mt-5 flex justify-end gap-2"><Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      <Btn icon="check" disabled={!valid} onClick={()=>{ const clean={...f}; ['budget','spend','leads','impressions','clicks','conversions','roas'].forEach(k=> clean[k]= clean[k]===''?0:Number(clean[k])); onSave(clean); }}>{initial?'Save changes':'Launch campaign'}</Btn></div></>;
}

function CampaignsPage({ data, api }){
  const toast=useToast();
  const [period,setPeriod]=useState('all');
  const [statusFilter,setStatusFilter]=useState('All');
  const [vertFilter,setVertFilter]=useState('All');
  const [modal,setModal]=useState(null);
  const [drawer,setDrawer]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);

  const filtered = useMemo(()=>{ let r=data.campaigns;
    if(statusFilter!=='All') r=r.filter(c=>c.status===statusFilter);
    if(vertFilter!=='All') r=r.filter(c=>c.vertical===vertFilter);
    return r; },[data.campaigns,statusFilter,vertFilter]);

  const a = aggPerf(filtered, period);
  const active = data.campaigns.filter(c=>c.status==='Active').length;
  const cards=[
    { label:'Total Spend', value:fmtINR(a.spend), icon:'wallet', trend:8.2, accent:C.azure },
    { label:'Total Budget', value:fmtINR(a.budget), icon:'piggy-bank', accent:C.turquoise, sub:a.util.toFixed(0)+'% used' },
    { label:'Leads', value:fmtNum(a.leads), icon:'magnet', trend:14.7, accent:C.orange },
    { label:'Avg CPL', value:'₹'+Math.round(a.cpl), icon:'trending-down', trend:-5.4, accent:C.purple },
    { label:'Active', value:active, icon:'radio', accent:C.turquoise, sub:'of '+data.campaigns.length }
  ];

  const cols=[
    { key:'name', label:'Campaign', bold:true },
    { key:'platform', label:'Platform' },
    { key:'category', label:'Category', sortValue:r=>campaignCategory(r).sub, render:r=>{ const cat=campaignCategory(r); return <span className="text-[12px] font-medium" style={{ color:C.azure }}>{cat.sub}</span>; } },
    { key:'vertical', label:'Vertical', render:r=><span className="inline-flex items-center gap-1.5"><span className="w-2 h-2 rounded-full" style={{ background:VERTICAL_COLORS[r.vertical] }} />{r.vertical}</span> },
    { key:'status', label:'Status', render:r=><StatusPill status={r.status} /> },
    { key:'budget', label:'Budget', align:'right', render:r=>fmtINR(r.budget) },
    { key:'spend', label:'Spend', align:'right', render:r=>fmtINR(campaignView(r,period).vSpend) },
    { key:'leads', label:'Leads', align:'right', render:r=>fmtNum(campaignView(r,period).vLeads) },
    { key:'cpl', label:'CPL', align:'right', sortValue:r=>campaignView(r,period).cpl, render:r=>'₹'+Math.round(campaignView(r,period).cpl) },
    { key:'_act', label:'', sortable:false, render:r=> <div className="flex gap-1 justify-end" onClick={e=>e.stopPropagation()}>
        {r.status!=='Completed' && <button onClick={()=>{ const next= r.status==='Active'?'Paused':'Active'; api.update('campaigns', r.id, { status:next }); toast(next==='Paused'?'Campaign paused':'Campaign resumed'); }} className="p-1.5 rounded-lg hover:bg-[#F1F4FB]" title={r.status==='Active'?'Pause':'Resume'}><Icon name={r.status==='Active'?'pause':'play'} size={15} color={C.azure} /></button>}
        <button onClick={()=>setDrawer(r)} className="p-1.5 rounded-lg hover:bg-[#F1F4FB]" title="Details"><Icon name="eye" size={15} color={C.grey} /></button>
        <button onClick={()=>setConfirmDel(r)} className="p-1.5 rounded-lg hover:bg-[#FDE8E8]" title="Delete"><Icon name="trash-2" size={15} color="#E53E3E" /></button></div> }
  ];

  return <div>
    <PageHeader title="Campaigns" subtitle="Launch, pause and manage paid campaigns" period={period} onPeriod={setPeriod}>
      <Btn icon="plus" onClick={()=>setModal({ type:'create' })}>New campaign</Btn>
    </PageHeader>

    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-4">{cards.map((c,i)=><KPI key={i} {...c} />)}</div>

    <SectionCard title="All campaigns" right={
      <div className="flex flex-wrap items-center gap-2">
        <Select value={vertFilter} onChange={setVertFilter} options={['All',...VERTICALS]} />
        <StatusChips value={statusFilter} onChange={setStatusFilter} options={['All','Active','Paused','Completed']} />

    <Modal open={!!modal} onClose={()=>setModal(null)} wide title={modal?.type==='edit'?'Edit campaign':'New campaign'} accent={C.azure}>

    <Drawer open={!!drawer} onClose={()=>setDrawer(null)} title={drawer?.name} accent={drawer?VERTICAL_COLORS[drawer.vertical]:C.azure}>

          <MiniStat label="Leads" value={fmtNum(v.vLeads)} accent={C.turquoise} />

          <MiniStat label="Impressions" value={fmtNum(v.vImpr)} />
          <MiniStat label="Clicks" value={fmtNum(v.vClicks)} />
          <MiniStat label="Conversions" value={fmtNum(v.vConv)} accent={C.turquoise} />
          <MiniStat label="ROAS" value={drawer.roas+'x'} accent={C.azure} />

          <div className="h-2 rounded-full bg-[#EEF1F8] overflow-hidden"><div className="h-full rounded-full" style={{ width:(drawer.budget? Math.min(100,drawer.spend/drawer.budget*100):0)+'%', background:`linear-gradient(90deg,${C.turquoise},${C.azure})` }} /></div></div>

        <div className="mt-5 flex gap-2 flex-wrap">
          {drawer.status!=='Completed' && <Btn variant="ghost" icon={drawer.status==='Active'?'pause':'play'} onClick={()=>{ const next=drawer.status==='Active'?'Paused':'Active'; api.update('campaigns',drawer.id,{ status:next }); setDrawer({...drawer,status:next}); toast(next==='Paused'?'Paused':'Resumed'); }}>{drawer.status==='Active'?'Pause':'Resume'}</Btn>}

    <Confirm open={!!confirmDel} onClose={()=>setConfirmDel(null)} title="Delete campaign?"

      onConfirm={()=>{ api.remove('campaigns', confirmDel.id); setDrawer(null); toast('Campaign deleted','error'); }} />
  </div>;
}

// Each program (the Vertical / Category) gets its own stable colour, assigned in sorted order.
const PROGRAM_PALETTE = ['#073393','#00D8B9','#FF934F','#A682FF','#16A34A','#E11D48','#0EA5E9','#F59E0B','#8B5CF6','#14B8A6','#EC4899','#FFB2E6','#64748B','#22C55E','#EF4444','#3B82F6'];
function buildProgramColors(posts){
  const names = Array.from(new Set((posts||[]).map(p=>(p.vertical||'').trim()).filter(Boolean))).sort();
  const map={}; names.forEach((n,i)=>{ map[n]=PROGRAM_PALETTE[i%PROGRAM_PALETTE.length]; }); return map;
}

function MonthGrid({ posts, monthDate, onDayClick, onPostClick, programColors }){
  const pc=(p)=> (programColors && programColors[(p.vertical||'').trim()]) || C.grey;
  const y=monthDate.getFullYear(), m=monthDate.getMonth();
  const first=new Date(y,m,1), startDow=first.getDay();
  const daysIn=new Date(y,m+1,0).getDate();
  const cells=[]; for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysIn;d++) cells.push(d);
  // Parse YYYY-MM-DD by parts (new Date(str) is UTC-parsed and shifts the day in non-UTC zones).
  const byDay={}; posts.forEach(p=>{ const mm=/^(\d{4})-(\d{2})-(\d{2})/.exec(p.date||''); let py,pmo,pday;
    if(mm){ py=+mm[1]; pmo=+mm[2]-1; pday=+mm[3]; } else { const dt=new Date(p.date); py=dt.getFullYear(); pmo=dt.getMonth(); pday=dt.getDate(); }
    if(py===y && pmo===m){ (byDay[pday]=byDay[pday]||[]).push(p); } });
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return <div>
    <div className="grid grid-cols-7 gap-1 mb-1">{dow.map(d=><div key={d} className="text-[10px] font-semibold text-center py-1" style={{ color:C.grey }}>{d}</div>)}</div>
    <div className="grid grid-cols-7 gap-1">{cells.map((d,i)=> d===null? <div key={i} /> :
      <button key={i} onClick={()=>onDayClick(new Date(y,m,d))} className="min-h-[78px] rounded-lg border border-[#EEF1F8] p-1.5 text-left hover:border-[#073393] transition-all align-top">
        <div className="text-[11px] font-semibold mb-1" style={{ color: (d===new Date().getDate()&&m===new Date().getMonth()&&y===new Date().getFullYear())?C.azure:C.ink }}>{d}</div>
        <div className="space-y-1">{(byDay[d]||[]).slice(0,3).map(p=>
          <div key={p.id} onClick={(e)=>{ e.stopPropagation(); onPostClick(p); }} className="text-[9px] font-semibold px-1.5 py-0.5 rounded truncate" style={{ background:pc(p)+'26', color:C.ink, borderLeft:'2px solid '+pc(p) }} title={(p.vertical? p.vertical+' · ':'')+p.title}>
            <span className="w-1.5 h-1.5 rounded-full inline-block mr-1 align-middle" style={{ background: pc(p) }} />{p.title}</div>)}
          {(byDay[d]||[]).length>3 && <div className="text-[9px] font-medium" style={{ color:C.grey }}>+{byDay[d].length-3} more</div>}</div>
      </button>)}</div>
  </div>;
}

/* =========================================================
   GOOGLE SHEETS LIVE CALENDAR — mirrors the social calendar sheet via /api/sheets.
   READ-ONLY: when configured the calendar reflects the sheet live; clicking a date
   opens that day's posts and clicking a post shows every column from the row.
   ========================================================= */
function useSheetCalendar(){
  const [s,setS]=useState({ loading:true, configured:false, ok:false, posts:[], headers:[], source:null, error:null, fetchedAt:null });
  const reqRef=useRef(0);
  const load=useCallback(()=>{
    const my=++reqRef.current; setS(p=>({ ...p, loading:true }));
    fetch('/api/sheets').then(r=>r.json()).catch(e=>({ configured:false, ok:false, error:String(e), posts:[] }))
      .then(j=>{ if(my!==reqRef.current) return;
        setS({ loading:false, configured:!!j.configured, ok:!!j.ok, posts:j.posts||[], headers:j.headers||[], source:j.source||null, error:j.error||null, fetchedAt:j.fetchedAt||null }); });
  },[]);
  useEffect(()=>{ load(); const iv=setInterval(load,60000); return ()=>clearInterval(iv); },[load]);
  return [s,load];
}

function LiveBadgeSheets({ fetchedAt, onRefresh, loading, source }){
  const t = fetchedAt? new Date(fetchedAt).toLocaleTimeString('en-IN',{ hour:'2-digit', minute:'2-digit' }) : '—';
  const ms = source==='microsoft';
  const label = ms? 'Live from SharePoint' : 'Live from Google Sheets';
  const bg = ms? '#E6F0FA' : '#E6F4EA', dot = ms? '#217346' : '#0F9D58', fg = ms? '#1A5E38' : '#0B6E3E';
  return <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl" style={{ background:bg }}>
    <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-60" style={{ background:dot }} /><span className="relative inline-flex rounded-full h-2 w-2" style={{ background:dot }} /></span>
    <span className="text-[11px] font-bold" style={{ color:fg }}>{label}</span>
    <span className="text-[10px] font-medium" style={{ color:fg }}>· updated {t}</span>
    <button onClick={onRefresh} className="ml-1 p-1 rounded-lg hover:bg-white/60" title="Refresh now"><Icon name={loading?'loader':'refresh-cw'} size={13} color={fg} /></button>
  </div>;
}

function ContentPage({ data, api }){
  const toast=useToast();
  const [sheet,reloadSheet]=useSheetCalendar();
  const live = sheet.configured && sheet.ok;       // sheet reachable → calendar is live + read-only
  const readOnly = live;
  const sheetError = sheet.configured && sheet.error && !sheet.loading && !live;

  const [view,setView]=useState('calendar'); // calendar | list
  const [statusFilter,setStatusFilter]=useState('All');
  const [monthDate,setMonthDate]=useState(()=>{ const d=new Date(); d.setDate(1); return d; });
  const [modal,setModal]=useState(null);
  const [drawer,setDrawer]=useState(null);
  const [dayDrawer,setDayDrawer]=useState(null);   // ISO date string → day detail (live mode)
  const [confirmDel,setConfirmDel]=useState(null);

  const posts = live ? sheet.posts : data.posts;
  const noDate = live ? posts.filter(p=>!p.date).length : 0;
  const filtered = statusFilter==='All'? posts : posts.filter(p=>p.status===statusFilter);
  const programColors = useMemo(()=>buildProgramColors(posts),[posts]);
  const programLegend = useMemo(()=>Object.keys(programColors).sort(),[programColors]);
  const monthName=monthDate.toLocaleString('en',{ month:'long', year:'numeric' });
  const shiftMonth=(n)=> setMonthDate(d=>{ const x=new Date(d); x.setMonth(x.getMonth()+n); return x; });
  const dayPosts = dayDrawer? posts.filter(p=>p.date===dayDrawer) : [];

  const cols=[
    { key:'title', label:'Post', bold:true },
    { key:'platform', label:'Platform', render:r=><span className="inline-flex items-center gap-1.5"><span className="w-2 h-2 rounded-full" style={{ background:PLATFORM_COLORS[r.platform] }} />{r.platform}</span> },
    { key:'vertical', label:'Vertical' },
    { key:'owner', label:'Owner' },
    { key:'date', label:'Date', render:r=>r.date? fmtDate(r.date):'—' },
    { key:'paid', label:'Type', render:r=> r.paid? <span className="text-[11px] font-bold px-2 py-0.5 rounded-full" style={{ background:C.azure, color:'#fff' }}>PAID</span> : <span className="text-[11px] font-medium" style={{ color:C.grey }}>Organic</span>, sortValue:r=>r.paid?1:0 },
    { key:'status', label:'Status', render:r=><StatusPill status={r.status} />, sortValue:r=>({ Draft:0, Scheduled:1, Published:2 }[r.status]) }
  ];
  if(!readOnly) cols.push({ key:'_act', label:'', sortable:false, render:r=><div className="flex gap-1 justify-end" onClick={e=>e.stopPropagation()}>
        <button onClick={()=>{ setModal({ type:'edit', post:r }); }} className="p-1.5 rounded-lg hover:bg-[#F1F4FB]" title="Edit"><Icon name="pencil" size={15} color={C.azure} /></button>
        <button onClick={()=>setConfirmDel(r)} className="p-1.5 rounded-lg hover:bg-[#FDE8E8]" title="Delete"><Icon name="trash-2" size={15} color="#E53E3E" /></button></div> });

  // Build the ISO date from local parts (toISOString() would shift the day in +UTC zones like IST).

/* =========================================================
   JIRA LIVE TASKS — fetches the Design board from /api/jira.
   READ-ONLY: when Jira is configured the board mirrors live issues
   (drag/edit disabled). Falls back to the local task store otherwise.
   ========================================================= */
function useJiraTasks(){
  const [s,setS]=useState({ loading:true, configured:false, ok:false, tasks:[], error:null, fetchedAt:null, site:null });
  const reqRef=useRef(0);
  const load=useCallback(()=>{
    const my=++reqRef.current;
    setS(p=>({ ...p, loading:true }));
    fetch('/api/jira?resource=tasks').then(r=>r.json()).catch(e=>({ configured:false, ok:false, error:String(e), tasks:[] }))
      .then(j=>{ if(my!==reqRef.current) return;
        setS({ loading:false, configured:!!j.configured, ok:!!j.ok, tasks:j.tasks||[], error:j.error||null, fetchedAt:j.fetchedAt||null, site:j.site||null }); });
  },[]);
  useEffect(()=>{ load(); const iv=setInterval(load,120000); return ()=>clearInterval(iv); },[load]);
  return [s, load];
}

    {tab==='board' && <div className="flex flex-wrap items-center gap-2 mb-4">

          style={ monthFilter===k? { background:C.azure, color:'#fff', borderColor:C.azure } : { background:'#fff', color:C.grey, borderColor:'#E6EAF2' } }>

    </div>}

    {tab==='library' ? <LibraryView /> : tab==='templates' ? <TemplatesView /> : <>
    <div className="grid grid-cols-3 gap-3 mb-4">
      <KPI label="Total tasks" value={total} icon="layers" accent={C.azure} />
      <KPI label="Completed" value={done} icon="check-circle-2" accent={C.turquoise} sub={progress.toFixed(0)+'%'} />

    <div className="bg-white rounded-2xl border border-[#EEF1F8] p-4 mb-4" style={{ boxShadow:'0 4px 18px -12px rgba(7,51,147,.14)' }}>

    <Confirm open={!!confirmDel} onClose={()=>setConfirmDel(null)} title="Delete task?"
      message={confirmDel? `"${confirmDel.task}" will be removed.`:''}

/* Content-category themes — classify live calendar posts to surface high-performing themes. */
const SOCIAL_THEMES = [
  { key:'Robotics', kw:['robot','vex','tinkrworks','arduino'] },
  { key:'Drone', kw:['drone'] },
  { key:'AI', kw:['aiq','artificial intelligence',' ai ','videogenx','prismix','filmmaking','vibecodex','genx'] },
  { key:'Entrepreneurship', kw:['entrepreneur','launchpad','young pioneer','ypl','pitch','startup','imaginex'] },
  { key:'Events', kw:['event','expo','bootcamp','showcase','championship','demo day','session','workshop'] },
  { key:'Partnerships', kw:['partner','qualcomm','iit','harvard','hbi','cambridge',' x ','collab','aptech','amg'] },
  { key:'Thought Leadership', kw:['thought','skills that matter','empathy','feedback','career','emotional intelligence','leadership','underused'] }
];
const THEME_COLORS = { AI:'#073393', Robotics:'#FF934F', Drone:'#00D8B9', Entrepreneurship:'#A682FF', Events:'#EC4899', Partnerships:'#16A34A', 'Thought Leadership':'#F59E0B', Other:'#8A93A6' };
function classifyTheme(p){
  const s = ((p.title||'')+' '+(p.vertical||'')+' '+(p.caption||'')).toLowerCase();
  for(const t of SOCIAL_THEMES){ if(t.kw.some(k=>s.includes(k))) return t.key; }
  return 'Other';
}
function ContentCategoryPanel({ posts }){
  const { rows, total } = useMemo(()=>{
    const counts={}; SOCIAL_THEMES.forEach(t=>counts[t.key]=0); counts['Other']=0;
    (posts||[]).forEach(p=>{ counts[classifyTheme(p)]++; });
    const rows=Object.keys(counts).map(k=>({ name:k, value:counts[k] })).filter(r=>r.value>0).sort((a,b)=>b.value-a.value);
    return { rows, total: rows.reduce((s,r)=>s+r.value,0) };
  },[posts]);
  const pieData = rows.map(r=>({ ...r, fill: THEME_COLORS[r.name]||C.grey }));
  return <SectionCard title="Content category performance" right={<span className="text-[11px] font-medium" style={{ color:C.grey }}>{total} posts · from calendar</span>}>
    {rows.length? <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 items-center">
      <ResponsiveContainer width="100%" height={230}><PieChart>
        <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={52} outerRadius={88} paddingAngle={2} animationDuration={700}>
          {pieData.map((e,i)=><Cell key={i} fill={e.fill} />)}</Pie>
        <Tooltip content={<TT />} />
      </PieChart></ResponsiveContainer>
      <div className="space-y-1.5">{rows.map(r=>{ const pct = total? Math.round(r.value/total*100):0; return (
        <div key={r.name} className="flex items-center justify-between text-[12px] font-medium" style={{ color:C.ink }}>
          <span className="inline-flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm" style={{ background:THEME_COLORS[r.name]||C.grey }} />{r.name}</span>
          <span className="tabnum" style={{ color:C.grey }}>{r.value} · {pct}%</span>
        </div>); })}</div>
    </div>
      : <div className="text-center py-10 text-sm font-medium" style={{ color:C.grey }}>No calendar posts to categorize yet.</div>}
    <div className="mt-3 text-[11px] font-medium" style={{ color:C.grey }}>Themes derived live from your content calendar (title + program). Spot high-volume vs under-served themes.</div>
  </SectionCard>;
}

// Side-by-side Organic vs Boosted summary. Organic = unpaid account/post activity (followers,
// post engagement). Boosted = paid Meta Ads "Social Boost" campaigns (spend, paid reach, results).
function OrgVsBoostOverview({ ig, fb, li, igLive, fbLive, liLive, boost, boostCount }){
  const orgFollowers = (igLive?(ig.profile.followers||0):0)+(fbLive?(fb.profile.followers||0):0)+(liLive?((li.totals&&li.totals.followers)||0):0);
  const igEng=(ig.media||[]).reduce((s,p)=>s+(p.engagement||0),0);
  const fbEng=(fb.posts||[]).reduce((s,p)=>s+(p.engagement||0),0);
  const orgEng=(igLive?igEng:0)+(fbLive?fbEng:0);
  const orgPosts=(igLive?(ig.media||[]).length:0)+(fbLive?(fb.posts||[]).length:0);
  const panel = (title, sub, icon, color, bg, items)=>
    <div className="rounded-2xl border border-[#EEF1F8] bg-white p-4" style={{ boxShadow:'0 4px 18px -12px rgba(7,51,147,.14)' }}>
      <div className="flex items-center gap-2.5 mb-3">
        <div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{ background:bg }}><Icon name={icon} size={18} color={color} /></div>
        <div><div className="text-[14px] font-bold" style={{ color:C.azure }}>{title}</div><div className="text-[11px] font-medium" style={{ color:C.grey }}>{sub}</div></div>
      </div>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">{items.map((c,i)=><Metric key={i} {...c} />)}</div>
    </div>;
  return <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">
    {panel('Organic', 'Unpaid — your accounts & posts', 'leaf', '#0E9F6E', '#E0F7F3', [
      { label:'Followers', value:fmtNum(orgFollowers), icon:'users', accent:'#0E9F6E' },
      { label:'Posts 30d', value:fmtNum(orgPosts), icon:'layout-grid', accent:'#0E9F6E' },
      { label:'Post engagement', value:fmtNum(orgEng), icon:'heart', accent:'#0E9F6E', sub:'likes+comments+shares' },
      { label:'Avg / post', value: orgPosts? fmtNum(Math.round(orgEng/orgPosts)):'—', icon:'sparkles', accent:'#0E9F6E' }
    ])}
    {panel('Boosted', 'Paid — via Meta Ads', 'rocket', C.orange, '#FCE9D6', [
      { label:'Spend', value:fmtINR(boost.spend), icon:'wallet', accent:C.orange },
      { label:'Paid reach', value:fmtNum(boost.reach), icon:'radio', accent:C.orange },
      { label:'Impressions', value:fmtNum(boost.impressions), icon:'eye', accent:C.orange },
      { label:'Results', value: boost.leads? fmtNum(boost.leads):'—', icon:'magnet', accent:C.orange, sub:boostCount+' campaigns' }
    ])}
  </div>;
}

function SocialPage({ data }){
  const [ig, reloadIg] = useInstagram();
  const [fb, reloadFb] = useFacebook();
  const [li, reloadLi] = useLinkedIn();
  const [sheet] = useSheetCalendar();
  const [boostMeta] = useMetaCampaigns('last_30d');
  const [tab, setTab] = useState(null);   // null → follow first connected platform
  const calPosts = (sheet.configured && sheet.ok)? sheet.posts : data.posts;
  // Paid boosts = Meta Ads campaigns whose objective category is "Social Media Boost".
  const boostCamps = (boostMeta.ok? (boostMeta.campaigns||[]):[]).filter(c=> campaignCategory(c).group==='Social Media Boost');
  const boost = metaTotals(boostCamps);

  const igLive = ig.configured && ig.ok && ig.profile;
  const fbLive = fb.configured && fb.ok && fb.profile;
  const liLive = li.configured && li.ok && li.totals;
  const connected = []; if(igLive) connected.push('instagram'); if(fbLive) connected.push('facebook'); if(liLive) connected.push('linkedin');
  const activeTab = tab || connected[0] || 'instagram';

  const igErr = ig.configured && ig.error && !ig.loading;
  const fbErr = fb.configured && fb.error && !fb.loading;
  const liErr = li.configured && li.error && !li.loading;

  const hint = {
    instagram: igErr? ig.error : 'Set META_ACCESS_TOKEN (with instagram_basic + instagram_manage_insights) and IG_USER_ID in Vercel, then redeploy. Open /api/instagram?resource=whoami to find your IG_USER_ID.',
    facebook:  fbErr? fb.error : 'Set FB_PAGE_ID in Vercel — META_ACCESS_TOKEN needs pages_read_engagement + read_insights. Open /api/facebook?resource=whoami to find your Page ID.',
    linkedin:  liErr? li.error : 'LinkedIn needs Community Management API approval, then set LINKEDIN_ACCESS_TOKEN + LINKEDIN_ORG_ID in Vercel. Open /api/linkedin?resource=whoami to find your org ID.'
  };

  const loadingCard = <div className="rounded-2xl border border-[#EEF1F8] bg-white p-12 text-center fade-up" style={{ boxShadow:'0 4px 18px -12px rgba(7,51,147,.14)' }}>
    <Icon name="loader" size={26} color={C.grey} /><div className="mt-2 text-sm font-medium" style={{ color:C.grey }}>Loading live data…</div></div>;

  const renderTab = (key, live, loading, view, meta) =>
    live ? view : (loading ? loadingCard : <NotConnected platform={meta.label} icon={meta.icon} color={meta.color} hint={hint[key]} />);

  return <div>
    <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
      <div><h1 className="text-2xl font-bold" style={{ color:C.azure }}>Social</h1>
        <p className="text-sm font-medium mt-1" style={{ color:C.grey }}>Organic accounts vs paid boosts — clearly separated</p></div>
      <PlatformSwitcher value={activeTab} onChange={setTab} options={['instagram','facebook','linkedin']} connected={connected} />
    </div>

    {/* Top-level split: what's organic vs what came from paid boosts */}
    <OrgVsBoostOverview ig={ig} fb={fb} li={li} igLive={igLive} fbLive={fbLive} liLive={liLive} boost={boost} boostCount={boostCamps.length} />

    <div className="flex items-center gap-2 mb-3">
      <span className="inline-flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wide px-2.5 py-1 rounded-full" style={{ background:'#E0F7F3', color:'#066A5B' }}><Icon name="leaf" size={12} color="#066A5B" />Organic — account insights</span>
    </div>
    {activeTab==='instagram' && renderTab('instagram', igLive, ig.loading, <InstagramSocialView ig={ig} reload={reloadIg} />, SOCIAL_META.instagram)}
    {activeTab==='facebook'  && renderTab('facebook',  fbLive, fb.loading, <FacebookSocialView fb={fb} reload={reloadFb} />, SOCIAL_META.facebook)}
    {activeTab==='linkedin'  && renderTab('linkedin',  liLive, li.loading, <LinkedInSocialView li={li} reload={reloadLi} />, SOCIAL_META.linkedin)}

    <div className="flex items-center gap-2 mt-5 mb-3">

function TrafficBar({ s, max, delay }){
  return <div className="mb-3"><div className="flex justify-between text-xs font-semibold mb-1.5"><span style={{ color:C.ink }}>{s.name}</span><span className="tabnum" style={{ color:C.azure }}>{s.value}%</span></div>
    <div className="h-2.5 rounded-full bg-[#EEF1F8] overflow-hidden"><div className="h-full rounded-full" style={{ width:(s.value/max*100)+'%', background:s.fill, animation:`growBar 1s ease ${delay}s both` }} /></div></div>;
}
function useAnalytics(period){
  const [s,setS]=useState({ loading:true, configured:false, ok:false, totals:null, series:[], channels:[], topPages:[], landingPages:[], error:null, fetchedAt:null });
  const reqRef=useRef(0);
  const load=useCallback(()=>{
    const my=++reqRef.current; setS(p=>({ ...p, loading:true }));
    fetch('/api/analytics?period='+period).then(r=>r.json()).catch(e=>({ configured:false, ok:false, error:String(e) }))
      .then(j=>{ if(my!==reqRef.current) return;
        setS({ loading:false, configured:!!j.configured, ok:!!j.ok, totals:j.totals||null, series:j.series||[], channels:j.channels||[], topPages:j.topPages||[], landingPages:j.landingPages||[], error:j.error||null, fetchedAt:j.fetchedAt||null }); });
  },[period]);
  useEffect(()=>{ load(); const iv=setInterval(load,300000); return ()=>clearInterval(iv); },[load]);
  return [s,load];
}
function LiveBadgeGA({ fetchedAt, onRefresh, loading }){
  const t = fetchedAt? new Date(fetchedAt).toLocaleTimeString('en-IN',{ hour:'2-digit', minute:'2-digit' }) : '—';
  return <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl" style={{ background:'#FCE9D6' }}>
    <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-60" style={{ background:'#E8710A' }} /><span className="relative inline-flex rounded-full h-2 w-2" style={{ background:'#E8710A' }} /></span>
    <span className="text-[11px] font-bold" style={{ color:'#B45309' }}>Live from Google Analytics</span>
    <span className="text-[10px] font-medium" style={{ color:'#B45309' }}>· updated {t}</span>
    <button onClick={onRefresh} className="ml-1 p-1 rounded-lg hover:bg-white/60" title="Refresh now"><Icon name={loading?'loader':'refresh-cw'} size={13} color="#B45309" /></button>
  </div>;
}

/* =========================================================
   AI ASSISTANT  — floating chat grounded in the live dashboard data.
   Self-contained: posts to /api/chat (secure Gemini proxy). Does not touch
   any existing state or data flow.
   ========================================================= */
async function buildDashboardSnapshot(){
  // Fetch the same live endpoints the dashboard uses, in parallel, then compact.
  const getJSON = (url)=> fetch(url).then(r=>r.json()).catch(()=>null);
  const [meta, trend, acct, ig, fb, li, ga, jira, sheets] = await Promise.all([
    getJSON('/api/meta?resource=campaigns&date_preset=last_30d'),
    getJSON('/api/meta?resource=trend&date_preset=last_30d'),
    getJSON('/api/meta?resource=account&date_preset=last_30d'),
    getJSON('/api/instagram?resource=account'),
    getJSON('/api/facebook?resource=account'),
    getJSON('/api/linkedin?resource=account'),
    getJSON('/api/analytics?period=month'),
    getJSON('/api/jira'),
    getJSON('/api/sheets')
  ]);

  // The snapshot is resent with EVERY chat message, and free LLM tiers cap tokens-per-minute,
  // so keep it lean: top campaigns by spend, compact fields, summaries instead of raw dumps.
  const round = (n)=> (typeof n==='number' && isFinite(n)) ? Math.round(n*100)/100 : n;
  const countBy = (arr, key)=> (arr||[]).reduce((m,x)=>{ const k=(x&&x[key])||'—'; m[k]=(m[k]||0)+1; return m; }, {});
  const snap = { generatedAt:new Date().toISOString(), dateRange:'last_30d', currency:'INR' };

  if(meta && meta.ok && Array.isArray(meta.campaigns)){
    const sorted = meta.campaigns.slice().sort((a,b)=>(b.spend||0)-(a.spend||0));
    snap.metaAds = {
      account: meta.account,
      campaignCount: meta.campaigns.length,
      totals: acct && acct.ok ? acct.totals : undefined,
      note: meta.campaigns.length>25 ? 'Showing top 25 campaigns by spend of '+meta.campaigns.length : undefined,
      campaigns: sorted.slice(0,25).map(c=>({
        name:c.name, vertical:c.vertical, platform:c.platform, status:c.status,
        spend:round(c.spend), impressions:c.impressions, clicks:c.clicks,
        ctr:round(c.ctr), cpc:round(c.cpc), leads:c.leads, cpl:round(c.cpl), roas:round(c.roas)
      }))
    };
  } else if(meta && meta.configured===false){ snap.metaAds = { configured:false }; }

  if(trend && trend.ok && Array.isArray(trend.trend)){
    // Daily spend/clicks/leads — the series most questions about "daily" need. Compact arrays.
    snap.metaDailyTrend = trend.trend.slice(-30).map(t=>({ date:t.date, spend:round(t.spend), clicks:t.clicks, leads:t.leads }));
  }
  if(ig && ig.ok)     snap.instagram = { followers:(ig.profile&&ig.profile.followers), totals:ig.totals };
  if(fb && fb.ok)     snap.facebook  = { followers:(fb.profile&&fb.profile.followers), totals:fb.totals };
  if(li && li.ok)     snap.linkedin  = { totals:li.totals };
  if(ga && ga.ok)     snap.googleAnalytics = { period:ga.period, totals:ga.totals, channels:ga.channels, topPages:(ga.topPages||[]).slice(0,5) };
  if(jira && jira.ok) snap.jiraDesignTasks = { count:(jira.tasks||[]).length, byStatus:countBy(jira.tasks,'status'), byOwner:countBy(jira.tasks,'owner') };
  if(sheets && sheets.ok) snap.socialCalendar = { count:(sheets.posts||[]).length, byStatus:countBy(sheets.posts,'status') };

  return snap;
}

function ChatAssistant(){
  const [open,setOpen]   = useState(false);
  const [msgs,setMsgs]   = useState([{ role:'assistant', content:"Hi! I'm your marketing data assistant. Ask me anything about your live dashboard — e.g. \"Which campaign has the best CPL?\" or \"How is spend trending this month?\"" }]);
  const [input,setInput] = useState('');
  const [busy,setBusy]   = useState(false);
  const snapRef          = useRef(null);   // cached snapshot {data, at}
  const scrollRef        = useRef(null);

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); }, [open, msgs, busy]);
  useEffect(()=>{ const el=scrollRef.current; if(el) el.scrollTop=el.scrollHeight; }, [msgs, busy, open]);

  async function ensureSnapshot(force){
    const fresh = snapRef.current && (Date.now()-snapRef.current.at < 120000); // reuse within 2 min
    if(fresh && !force) return snapRef.current.data;
    const data = await buildDashboardSnapshot();
    snapRef.current = { data, at:Date.now() };
    return data;
  }

  async function send(){
    const text = input.trim();
    if(!text || busy) return;
    const nextMsgs = [...msgs, { role:'user', content:text }];
    setMsgs(nextMsgs); setInput(''); setBusy(true);
    try{
      const context = await ensureSnapshot(false);
      const r = await fetch('/api/chat', {
        method:'POST', headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ messages: nextMsgs.map(m=>({ role:m.role, content:m.content })), context })
      });
      const j = await r.json();
      const reply = j && j.ok ? j.reply : ('⚠️ '+((j && j.error) || 'Something went wrong.'));
      setMsgs(m=>[...m, { role:'assistant', content:reply }]);
    }catch(e){
      setMsgs(m=>[...m, { role:'assistant', content:'⚠️ Could not reach the assistant: '+String(e && e.message || e) }]);
    }finally{ setBusy(false); }
  }

  const suggestions = ['Summarise this month’s performance','Which campaign has the best CPL?','Where should I shift budget?'];

  return <>
    {/* Launcher */}
    <button onClick={()=>setOpen(o=>!o)} aria-label="AI assistant"
      className="fixed z-50 bottom-5 right-5 rounded-full shadow-lg flex items-center justify-center transition-transform hover:scale-105"
      style={{ width:56, height:56, background:'linear-gradient(135deg,'+C.azure+','+C.turquoise+')', boxShadow:'0 10px 30px -8px rgba(7,51,147,.5)' }}>
      <Icon name={open?'x':'sparkles'} size={24} color="#fff" />
    </button>

    {/* Panel */}
    {open && <div className="fixed z-50 bottom-24 right-5 flex flex-col bg-white rounded-2xl overflow-hidden"
      style={{ width:'min(390px, calc(100vw - 2.5rem))', height:'min(620px, calc(100vh - 8rem))', border:'1px solid '+C.greyLine, boxShadow:'0 24px 60px -20px rgba(7,51,147,.45)' }}>
      <div className="flex items-center justify-between px-4 py-3 shrink-0" style={{ background:'linear-gradient(135deg,'+C.azure+','+C.turquoise+')' }}>
        <div className="flex items-center gap-2 text-white">
          <Icon name="sparkles" size={18} color="#fff" />
          <div><div className="font-bold text-sm leading-tight">Marketing AI</div><div className="text-[10px] opacity-80 leading-tight">Grounded in your live data</div></div>
        </div>
        <button onClick={()=>setOpen(false)} className="text-white/80 hover:text-white"><Icon name="x" size={18} color="#fff" /></button>
      </div>

      <div ref={scrollRef} className="flex-1 overflow-y-auto px-3 py-3 space-y-2.5" style={{ background:C.ghost }}>
        {msgs.map((m,i)=> <div key={i} className={'flex '+(m.role==='user'?'justify-end':'justify-start')}>
          <div className="max-w-[85%] rounded-2xl px-3 py-2 text-[13px] leading-relaxed whitespace-pre-wrap"
            style={ m.role==='user'
              ? { background:C.azure, color:'#fff', borderBottomRightRadius:4 }
              : { background:'#fff', color:C.ink, border:'1px solid '+C.greyLine, borderBottomLeftRadius:4 } }>{m.content}</div>
        </div>)}
        {busy && <div className="flex justify-start"><div className="rounded-2xl px-3 py-2 text-[13px]" style={{ background:'#fff', color:C.grey, border:'1px solid '+C.greyLine }}>Analysing your data…</div></div>}
        {msgs.length<=1 && !busy && <div className="flex flex-wrap gap-1.5 pt-1">
          {suggestions.map(s=> <button key={s} onClick={()=>setInput(s)} className="text-[11px] font-medium px-2.5 py-1 rounded-full" style={{ background:'#fff', color:C.azure, border:'1px solid '+C.greyLine }}>{s}</button>)}
        </div>}
      </div>

      <div className="shrink-0 p-2.5 border-t flex items-end gap-2" style={{ borderColor:C.greyLine }}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} rows={1} placeholder="Ask about your dashboard…"
          onKeyDown={e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }}
          className="flex-1 resize-none rounded-xl px-3 py-2 text-[13px] outline-none" style={{ border:'1px solid '+C.greyLine, maxHeight:96 }} />
        <button onClick={send} disabled={busy||!input.trim()} className="rounded-xl p-2 shrink-0 transition-opacity"
          style={{ background:C.azure, opacity:(busy||!input.trim())?0.5:1 }}><Icon name="send" size={18} color="#fff" /></button>
      </div>
    </div>}
  </>;
}

// SharePoint brief index (campaign_id -> brief_url), fetched server-side via Microsoft Graph.
function useGraphBriefs(){
  const [state,setState] = useState({ loading:true, configured:false, ok:false, briefs:{}, targets:{}, error:null });
  const load = useCallback(()=>{
    setState(s=>({ ...s, loading:true }));
    fetch('/api/graph?resource=briefs').then(r=>r.json())
      .then(j=> setState({ loading:false, configured:!!j.configured, ok:!!j.ok, briefs:j.briefs||{}, targets:j.targets||{}, error:j.error||null }))
      .catch(e=> setState({ loading:false, configured:false, ok:false, briefs:{}, targets:{}, error:String(e) }));
  },[]);
  useEffect(()=>{ load(); },[load]);
  return [state, load];
}

// Meta creatives + videos for ONE campaign (fetched on demand when a detail view opens).
function useCampaignCreatives(campaignId){
  const [state,setState] = useState({ loading:false, ok:false, configured:false, creatives:[], error:null });
  useEffect(()=>{
    if(!campaignId){ setState({ loading:false, ok:false, configured:false, creatives:[], error:null }); return; }
    let alive=true;
    setState(s=>({ ...s, loading:true, error:null }));
    fetch('/api/meta-creatives?campaign_id='+encodeURIComponent(campaignId)).then(r=>r.json())
      .then(j=>{ if(!alive) return; setState({ loading:false, configured:!!j.configured, ok:!!j.ok, creatives:j.creatives||[], error:j.error||null }); })
      .catch(e=>{ if(!alive) return; setState({ loading:false, ok:false, configured:false, creatives:[], error:String(e) }); });
    return ()=>{ alive=false; };
  },[campaignId]);
  return state;
}

// One representative thumbnail per campaign (campaign_id -> image url), for the card grid.
function useCampaignThumbnails(){
  const [map,setMap] = useState({});
  useEffect(()=>{
    let alive=true;
    fetch('/api/meta-creatives?resource=thumbnails').then(r=>r.json())
      .then(j=>{ if(alive && j && j.thumbnails) setMap(j.thumbnails); })
      .catch(()=>{});
    return ()=>{ alive=false; };
  },[]);
  return map;
}

// One creative card for the gallery grid: full-resolution image/video + its individual performance.
function CreativeTile({ c }){
  const isVideo = c.type==='video';
  // Show the highest-quality still we have; videos use their poster frame.
  const display = isVideo ? (c.thumbnail || c.image) : (c.image || c.thumbnail);
  const openUrl = isVideo ? (c.videoSource || c.image || c.thumbnail) : (c.image || c.thumbnail);
  const m = c.metrics;
  return <div className="rounded-xl border border-[#EEF1F8] overflow-hidden bg-white flex flex-col card-lift" style={{ boxShadow:'0 4px 18px -12px rgba(7,51,147,.14)' }}>

/* ---- Target parsing: turn free-form "target" text into metric goals vs live actuals ---- */
// A number token with Indian/Western suffixes and ₹/%/x: "50k", "1.2L", "₹50,000", "2%", "3.5x".
const TARGET_NUM = '(?:₹|rs\\.?\\s*)?(\\d[\\d,]*(?:\\.\\d+)?)\\s*(%|x|k|m|mn|bn|l|lac|lakh|cr|crore)?';
function targetToNumber(numStr, unit){
  let n = parseFloat(String(numStr).replace(/,/g,''));
  if(!isFinite(n)) return null;
  switch((unit||'').toLowerCase()){
    case 'k': n*=1e3; break;
    case 'm': case 'mn': n*=1e6; break;
    case 'bn': n*=1e9; break;
    case 'l': case 'lac': case 'lakh': n*=1e5; break;
    case 'cr': case 'crore': n*=1e7; break;
    default: break; // %, x, none → leave as typed
  }
  return n;
}
// Metric definitions — order matters: more specific (cpl/cpc) first so they consume their number
// before the generic leads/clicks keywords can.
const TARGET_METRICS = [
  { key:'cpl', label:'CPL', kw:['cpl','cost per lead'], actual:c=>c.leads? c.spend/c.leads : 0, fmt:v=>'₹'+Math.round(v), better:'low' },
  { key:'cpc', label:'CPC', kw:['cpc','cost per click'], actual:c=>c.cpc||0, fmt:v=>'₹'+(v||0).toFixed(2), better:'low' },
  { key:'ctr', label:'CTR', kw:['ctr'], actual:c=>c.ctr||0, fmt:v=>(v||0).toFixed(2)+'%', better:'high' },
  { key:'roas', label:'ROAS', kw:['roas'], actual:c=>c.roas||0, fmt:v=>(v||0).toFixed(2)+'x', better:'high' },
  { key:'spend', label:'Spend', kw:['spend','spent','budget','amount'], actual:c=>c.spend||0, fmt:fmtINR, better:'high' },
  { key:'leads', label:'Leads', kw:['leads','lead','results','result','conversions','conversion'], actual:c=>c.leads||0, fmt:fmtNum, better:'high' },
  { key:'clicks', label:'Clicks', kw:['link clicks','clicks','click'], actual:c=>c.clicks||0, fmt:fmtNum, better:'high' },
  { key:'impressions', label:'Impressions', kw:['impressions','impression','impr'], actual:c=>c.impressions||0, fmt:fmtNum, better:'high' },
  { key:'reach', label:'Reach', kw:['reach'], actual:c=>c.reach||0, fmt:fmtNum, better:'high' }
];
function parseTargets(text, campaign){
  let work = ' ' + String(text||'') + ' ';
  const found = [];
  for(const m of TARGET_METRICS){
    let val = null;
    for(const kw of m.kw){
      const k = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/\s+/g,'\\s+');
      let mm = work.match(new RegExp(k+'\\s*[:=\\-–]?\\s*'+TARGET_NUM, 'i'));   // "leads: 1000"
      if(!mm) mm = work.match(new RegExp(TARGET_NUM+'\\s*'+k, 'i'));            // "1000 leads"
      if(mm){
        val = targetToNumber(mm[1], mm[2]);
        work = work.slice(0, mm.index) + ' '.repeat(mm[0].length) + work.slice(mm.index + mm[0].length);
        break;
      }
    }
    if(val!=null && isFinite(val)){
      const actual = m.actual(campaign) || 0;
      const pct = m.better==='low' ? (actual>0 ? (val/actual)*100 : 0) : (val>0 ? (actual/val)*100 : 0);
      found.push({ key:m.key, label:m.label, target:val, actual, pct, fmt:m.fmt, better:m.better });
    }
  }
  return found;
}
function TargetProgress({ p }){
  const pct = isFinite(p.pct) ? p.pct : 0;
  const reached = pct>=100;
  const color = pct>=100 ? '#0E9F6E' : pct>=70 ? C.azure : pct>=40 ? C.orange : '#E53E3E';
  return <div className="rounded-xl border border-[#EEF1F8] p-3.5 bg-[#FBFCFE]">
    <div className="flex items-center justify-between mb-2">
      <span className="text-[12px] font-semibold" style={{ color:C.ink }}>{p.label}</span>
      <span className="text-[12px] font-bold tabnum inline-flex items-center gap-1" style={{ color }}>{Math.round(pct)}%{reached && <Icon name="check" size={13} color={color} />}</span>
    </div>
    <div className="h-2 rounded-full bg-[#EEF1F8] overflow-hidden mb-2">
      <div className="h-full rounded-full" style={{ width: Math.max(0,Math.min(100,pct))+'%', background:color, transition:'width .4s' }} />
    </div>
    <div className="flex items-center justify-between text-[11px] font-medium" style={{ color:C.grey }}>
      <span>Actual <b style={{ color:C.ink }}>{p.fmt(p.actual)}</b></span>
      <span>Target <b style={{ color:C.ink }}>{p.fmt(p.target)}</b></span>
    </div>
  </div>;
}

/* =========================================================
   LEADS TAB  — self-contained live lead-monitoring dashboard
   Metrics (counts, CPL, trend, by campaign/program) come live from /api/meta.
   Individual lead records (name/email/phone) come best-effort from /api/leads.
   Read-only; does not touch any existing tab or the local store.
